name: EAS Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      profile:
        description: Build profile to run
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

permissions:
  contents: read

concurrency:
  group: sound-dna-api-eas-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [android, ios]
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.profile || (startsWith(github.ref, 'refs/tags/v') && 'production' || 'preview') }}
      REQUESTED_PLATFORM: ${{ github.event_name == 'workflow_dispatch' && inputs.platform || 'all' }}
    steps:
      - name: Fail if EXPO_TOKEN is missing
        if: ${{ !env.EXPO_TOKEN }}
        run: |
          echo 'Missing EXPO_TOKEN repository secret.'
          echo 'Create one from your Expo account access tokens page before running EAS builds.'
          exit 1

      - uses: actions/checkout@v4
        if: ${{ env.REQUESTED_PLATFORM == 'all' || env.REQUESTED_PLATFORM == matrix.platform }}

      - name: Use Node.js 20.x
        if: ${{ env.REQUESTED_PLATFORM == 'all' || env.REQUESTED_PLATFORM == matrix.platform }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: ${{ env.REQUESTED_PLATFORM == 'all' || env.REQUESTED_PLATFORM == matrix.platform }}
        run: npm ci

      - name: Set up Expo and EAS
        if: ${{ env.REQUESTED_PLATFORM == 'all' || env.REQUESTED_PLATFORM == matrix.platform }}
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS build
        if: ${{ env.REQUESTED_PLATFORM == 'all' || env.REQUESTED_PLATFORM == matrix.platform }}
        run: eas build --non-interactive --platform ${{ matrix.platform }} --profile $EAS_PROFILE
